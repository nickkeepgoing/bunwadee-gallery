<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bunwadee Gallery 🌸</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2764.svg" type="image/svg+xml" />

  <!-- เชื่อมต่อ Cloudinary ล่วงหน้าเพื่อให้รูปโหลดเร็วขึ้น -->
  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
  <link rel="dns-prefetch" href="https://res.cloudinary.com" />

  <link rel="stylesheet" href="style.css" />

  <!-- icon -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <!-- Upload Modal (เฉพาะเจ้าของ) -->
  <div id="uploadModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeModalBtn">&times;</span>
      <h3>🌸 อัปโหลดรูปภาพ</h3>
      <form id="uploadForm" enctype="multipart/form-data">
        <input type="text" name="filename" placeholder="ตั้งชื่อรูป (เช่น เที่ยวทะเล)" required class="name-input" />
        <input type="file" name="image" accept=".png,.jpg,.jpeg,.gif,.heic,.webp" required />
        <button type="submit">อัพโหลด</button>
      </form>
    </div>
  </div>

  <div class="container">
    <!-- Navbar -->
    <div class="navbar">
      <ul>
        <li class="tooltip active" id="navHome"><a href="javascript:void(0)"><i class="bi bi-house-heart-fill"></i><span class="tooltip-text">หน้าหลัก</span></a></li>
        <li class="tooltip" id="navTimeline"><a href="javascript:void(0)"><i class="bi bi-film"></i><span class="tooltip-text">ไทม์ไลน์</span></a></li>
        <li class="tooltip" id="navAdd">
          <a href="javascript:void(0)" id="openModalBtn">
            <i class="bi bi-plus-square"></i>
            <span class="tooltip-text">เพิ่มรูป</span>
          </a>
        </li>
        <li class="tooltip"><a href="message.html"><i class="bi bi-chat-heart"></i><span class="tooltip-text">ข้อความ</span></a></li>
      </ul>
      <div class="settings">
        <a href="javascript:void(0)" class="setbut tooltip" id="logoutBtn"><i class="bi bi-box-arrow-right"></i><span class="tooltip-text">ออกจากระบบ</span></a>
      </div>
    </div>

    <div class="content">
      <!-- Header -->
      <div class="header">
        <div class="app-title"><span>🌸</span> Bunwadee Gallery</div>
        <div class="search">
          <div class="search-container">
            <span class="search-icon"><i class="bi bi-search-heart"></i></span>
            <input type="text" class="search-box" placeholder="ค้นหาชื่อรูป..." />
          </div>
        </div>
        <div class="profile-box">
          <div class="profile tooltip">
            <p>N</p>
            <span class="tooltip-text profile-name">ผู้ใช้</span>
          </div>
        </div>
      </div>

      <!-- Gallery (grid) -->
      <div class="gallery-box">
        <div class="gallery"></div>
      </div>

      <!-- Timeline (เส้นเวลาแนวตั้ง) -->
      <div class="timeline-box" hidden>
        <div class="timeline-wrap"></div>
      </div>
    </div>
  </div>

  <script>
    const galleryEl = document.querySelector('.gallery');
    const galleryBox = document.querySelector('.gallery-box');
    const timelineBox = document.querySelector('.timeline-box');
    const timelineEl = document.querySelector('.timeline-wrap');
    const searchInput = document.querySelector('.search-box');
    const uploadModal = document.getElementById('uploadModal');
    const uploadForm = document.getElementById('uploadForm');
    const submitBtn = uploadForm.querySelector('button[type="submit"]');

    let allImages = [];        // โหลดรูปครั้งเดียว ใช้ค้นหา/สลับวิว
    let currentRole = 'owner'; // owner | partner
    let currentView = 'grid';  // grid | timeline

    const GRID_SIZES = '(max-width:480px) 100vw, (max-width:768px) 48vw, 23vw';

    // ---------- helpers ----------
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));
    }

    function showState(container, html) {
      container.innerHTML = `<div class="gallery-state">${html}</div>`;
    }

    // ค่อย ๆ โผล่รูปเมื่อโหลดเสร็จ (ปลอดภัย: ถ้าโหลดเสร็จแล้ว/ผิดพลาด ก็แสดงทันที)
    function wireFadeIn(container) {
      container.querySelectorAll('img').forEach((img) => {
        if (img.complete) img.classList.add('loaded');
        else {
          img.addEventListener('load', () => img.classList.add('loaded'), { once: true });
          img.addEventListener('error', () => img.classList.add('loaded'), { once: true });
        }
      });
    }

    // ---------- render: grid ----------
    function renderGallery(list) {
      if (!list.length) {
        showState(galleryEl, `<div class="empty-emoji">🌸</div><p>${searchInput.value ? 'ไม่พบรูปที่ค้นหา' : 'ยังไม่มีรูปในแกลเลอรี'}</p>`);
        return;
      }
      const frag = document.createDocumentFragment();
      list.forEach((file) => {
        const name = escapeHtml(file.display_name);
        const ratio = file.width && file.height ? `style="aspect-ratio:${file.width}/${file.height}"` : '';
        const delBtn = currentRole === 'owner'
          ? `<button type="button" class="btn btn-danger" data-id="${escapeHtml(file.public_id)}"><i class="bi bi-trash"></i> ลบ</button>`
          : '';
        const pic = document.createElement('div');
        pic.className = 'pic';
        pic.innerHTML = `
          <img src="${file.thumb}" srcset="${file.srcset || ''}" sizes="${GRID_SIZES}" alt="${name}" loading="lazy" decoding="async" ${ratio}>
          <div class="overlay">
            <div class="pic-name">${name}</div>
            <div class="overlay-actions">
              <a href="${file.download}" class="btn btn-download"><i class="bi bi-download"></i> โหลด</a>
              ${delBtn}
            </div>
          </div>`;
        frag.appendChild(pic);
      });
      galleryEl.innerHTML = '';
      galleryEl.appendChild(frag);
      wireFadeIn(galleryEl);
    }

    // ---------- render: timeline (เส้นเวลาแนวตั้ง) ----------
    function renderTimeline(list) {
      if (!list.length) {
        showState(timelineEl, `<div class="empty-emoji">🎞️</div><p>${searchInput.value ? 'ไม่พบรูปที่ค้นหา' : 'ยังไม่มีรูปในแกลเลอรี'}</p>`);
        return;
      }
      const sorted = [...list].sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
      const groups = [];
      const map = new Map();
      sorted.forEach((f) => {
        const d = f.created_at ? new Date(f.created_at) : null;
        // ใช้วันที่ตามเวลาท้องถิ่น (ให้ตรงกับป้ายวันที่ที่แสดง)
        const key = d ? `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}` : 'unknown';
        if (!map.has(key)) { const g = { date: d, items: [] }; map.set(key, g); groups.push(g); }
        map.get(key).items.push(f);
      });

      const fmtDate = (d) => d ? d.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }) : 'ไม่ทราบวันที่';
      const fmtTime = (d) => d ? d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) : '';

      let html = '<div class="timeline">';
      groups.forEach((g) => {
        html += `<div class="tl-group"><div class="tl-date"><span class="tl-dot"></span>${fmtDate(g.date)}</div><div class="tl-items">`;
        g.items.forEach((f) => {
          const name = escapeHtml(f.display_name);
          const d = f.created_at ? new Date(f.created_at) : null;
          html += `<a class="tl-item" href="${f.full}" target="_blank" rel="noopener" title="${name}">
            <img src="${f.thumb}" srcset="${f.srcset || ''}" sizes="130px" alt="${name}" loading="lazy" decoding="async">
            <span class="tl-time">${fmtTime(d)}</span>
            <span class="tl-name">${name}</span>
          </a>`;
        });
        html += `</div></div>`;
      });
      html += '</div>';
      timelineEl.innerHTML = html;
      wireFadeIn(timelineEl);
    }

    // ---------- search + view ----------
    function applySearch() {
      const kw = searchInput.value.trim().toLowerCase();
      const list = kw ? allImages.filter((f) => (f.display_name || '').toLowerCase().includes(kw)) : allImages;
      if (currentView === 'grid') renderGallery(list);
      else renderTimeline(list);
    }

    function showView(view) {
      currentView = view;
      galleryBox.hidden = view !== 'grid';
      timelineBox.hidden = view !== 'timeline';
      document.getElementById('navHome').classList.toggle('active', view === 'grid');
      document.getElementById('navTimeline').classList.toggle('active', view === 'timeline');
      applySearch();
    }

    searchInput.addEventListener('input', applySearch);

    // ---------- load images ----------
    async function loadImages() {
      showState(currentView === 'grid' ? galleryEl : timelineEl, '<div class="spinner"></div><p>กำลังโหลดรูป...</p>');
      try {
        const res = await fetch('/images');
        if (res.status === 401) return (window.location.href = '/login.html');
        if (!res.ok) throw new Error('โหลดรูปไม่สำเร็จ (' + res.status + ')');
        const data = await res.json();
        allImages = Array.isArray(data) ? data : [];
        applySearch();
      } catch (err) {
        console.error(err);
        showState(currentView === 'grid' ? galleryEl : timelineEl, '<div class="empty-emoji">😿</div><p>โหลดรูปไม่สำเร็จ</p>');
      }
    }

    // ---------- delete (เฉพาะเจ้าของ) ----------
    async function deleteImage(publicId) {
      const confirm = await Swal.fire({
        title: 'ลบรูปนี้?',
        text: 'ลบแล้วเอากลับมาไม่ได้นะ',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'ลบเลย',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#ff6e6e',
        cancelButtonColor: '#c9b3b3',
      });
      if (!confirm.isConfirmed) return;

      try {
        const res = await fetch('/delete', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ public_id: publicId }),
        });
        if (res.status === 401) return (window.location.href = '/login.html');
        let data = {};
        try { data = await res.json(); } catch (_) {}

        if (res.ok && data.success) {
          allImages = allImages.filter((f) => f.public_id !== publicId);
          applySearch();
          Swal.fire({ icon: 'success', title: 'ลบสำเร็จ!', timer: 1200, showConfirmButton: false });
        } else {
          Swal.fire({ icon: 'error', title: 'ลบไม่สำเร็จ', text: data.error || 'เกิดข้อผิดพลาด', confirmButtonColor: '#eb8585' });
        }
      } catch (err) {
        Swal.fire({ icon: 'warning', title: 'มีปัญหา', text: 'ลบไม่สำเร็จ ลองใหม่', confirmButtonColor: '#eb8585' });
      }
    }

    // กดปุ่มลบ (event delegation รองรับชื่อที่มีอักขระพิเศษ)
    galleryEl.addEventListener('click', (e) => {
      const delBtn = e.target.closest('.btn-danger');
      if (delBtn) {
        e.preventDefault();
        deleteImage(delBtn.dataset.id);
      }
    });

    // ---------- modal ----------
    function openModal() { uploadModal.classList.add('show'); }
    function closeModal() { uploadModal.classList.remove('show'); }

    document.getElementById('openModalBtn').addEventListener('click', openModal);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    window.addEventListener('click', (e) => { if (e.target === uploadModal) closeModal(); });
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // ---------- upload ----------
    async function handleUpload(e) {
      e.preventDefault();
      const formData = new FormData(uploadForm);
      closeModal();
      submitBtn.disabled = true;
      submitBtn.textContent = 'กำลังอัปโหลด...';
      Swal.fire({ title: 'กำลังอัปโหลด...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        if (res.status === 401) return (window.location.href = '/login.html');
        let data = {};
        try { data = await res.json(); } catch (_) {}

        if (res.ok && data.success) {
          uploadForm.reset();
          allImages.unshift(data);
          applySearch();
          Swal.fire({ icon: 'success', title: 'อัปโหลดเสร็จแล้ว!', timer: 1300, showConfirmButton: false });
        } else {
          Swal.fire({
            icon: 'error',
            title: 'อัปโหลดไม่สำเร็จ',
            text: data.error || 'เกิดข้อผิดพลาด',
            confirmButtonText: 'ลองอีกครั้ง',
            confirmButtonColor: '#eb8585',
          }).then(openModal);
        }
      } catch (err) {
        console.error('Upload error:', err);
        Swal.fire({ icon: 'warning', title: 'มีปัญหา', text: 'อัปโหลดไม่สำเร็จ กรุณาลองใหม่', confirmButtonColor: '#eb8585' }).then(openModal);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'อัพโหลด';
      }
    }
    uploadForm.addEventListener('submit', handleUpload);

    // ---------- nav: สลับวิว ----------
    document.getElementById('navHome').addEventListener('click', () => showView('grid'));
    document.getElementById('navTimeline').addEventListener('click', () => showView('timeline'));

    // ---------- logout ----------
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const confirm = await Swal.fire({
        title: 'ออกจากระบบ?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'ออกจากระบบ',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#ff6e6e',
        cancelButtonColor: '#c9b3b3',
      });
      if (!confirm.isConfirmed) return;
      try { await fetch('/logout', { method: 'POST' }); } catch (_) {}
      window.location.href = '/login.html';
    });

    // ---------- who am I (โชว์ชื่อ + ซ่อนปุ่มตามสิทธิ์) ----------
    async function loadMe() {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) return;
        const me = await res.json();
        currentRole = me.role || 'owner';
        const name = (me.username || '').trim();
        document.querySelector('.profile p').textContent = (name.charAt(0) || '?').toUpperCase();
        document.querySelector('.profile-name').textContent = name || 'ผู้ใช้';
        // คุณแฟน = ดูอย่างเดียว → ซ่อนปุ่มเพิ่มรูป
        if (currentRole !== 'owner') {
          document.getElementById('navAdd').hidden = true;
        }
      } catch (_) {}
    }

    // ---------- init ----------
    window.addEventListener('DOMContentLoaded', async () => {
      await loadMe(); // รู้สิทธิ์ก่อน เพื่อ render ปุ่มลบให้ถูก
      loadImages();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ · Bunwadee</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2764.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --pink: #eb8585;
      --pink-deep: #ff6e6e;
      --pink-soft: #f4a3a3;
      --pink-bg: #ffe3e9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Mitr", sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      overflow: hidden;
    }

    .heart-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .heart-bg span {
      position: absolute;
      bottom: -40px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 20px;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp { to { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 370px;
      background: #fff;
      border-radius: 26px;
      padding: 34px 30px 30px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(214, 110, 130, 0.35);
      animation: pop 0.5s ease;
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-card .heart { font-size: 50px; display: inline-block; animation: beat 1.3s ease-in-out infinite; }
    @keyframes beat { 0%, 100% { transform: scale(1); } 25% { transform: scale(1.18); } 40% { transform: scale(1); } }
    .login-card h1 { font-size: 22px; color: var(--pink-deep); margin: 6px 0 20px; }

    /* แท็บสลับโหมด */
    .tabs { display: flex; gap: 6px; margin-bottom: 20px; background: var(--pink-bg); padding: 5px; border-radius: 14px; }
    .tab {
      flex: 1; border: none; background: none; padding: 10px 6px; border-radius: 10px;
      font-size: 13.5px; color: #b58; cursor: pointer; transition: 0.2s ease;
    }
    .tab.active { background: #fff; color: var(--pink-deep); font-weight: 500; box-shadow: 0 3px 10px rgba(255, 120, 150, 0.25); }

    .field {
      display: flex; align-items: center; gap: 10px;
      background: var(--pink-bg); border: 2px solid transparent; border-radius: 16px;
      padding: 12px 16px; margin-bottom: 14px; transition: 0.25s ease;
    }
    .field:focus-within { border-color: var(--pink-soft); background: #fff; box-shadow: 0 6px 16px rgba(255, 120, 150, 0.25); }
    .field i { color: var(--pink); font-size: 18px; }
    .field input { border: none; background: none; outline: none; width: 100%; font-size: 15px; color: #5a4a4a; }
    .field input[type="date"] { cursor: pointer; }
    .field .toggle { cursor: pointer; color: #c99; background: none; font-size: 18px; }
    .field .toggle:hover { color: var(--pink-deep); }

    .hint { font-size: 12.5px; color: #c08; opacity: 0.7; margin: -6px 0 14px; }

    button[type="submit"] {
      width: 100%; margin-top: 6px; padding: 13px; border: none; border-radius: 16px;
      font-size: 16px; font-weight: 500; color: #fff; cursor: pointer;
      background: linear-gradient(135deg, var(--pink-soft), var(--pink-deep));
      box-shadow: 0 8px 18px rgba(255, 110, 110, 0.4); transition: 0.25s ease;
    }
    button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 12px 22px rgba(255, 110, 110, 0.5); }
    button[type="submit"]:active { transform: translateY(0); }
    button[type="submit"]:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="heart-bg" id="heartBg"></div>

  <div class="login-card">
    <div class="heart">💖</div>
    <h1>Bunwadee Gallery</h1>

    <div class="tabs">
      <button type="button" class="tab active" data-mode="owner">เข้าสู่ระบบ</button>
      <button type="button" class="tab" data-mode="partner">login สำหรับคุณแฟน</button>
    </div>

    <!-- โหมดเจ้าของ: ชื่อผู้ใช้ + รหัสผ่าน -->
    <form id="ownerForm" autocomplete="on">
      <div class="field">
        <i class="bi bi-person-heart"></i>
        <input type="text" name="username" placeholder="ชื่อผู้ใช้" required autocomplete="username" />
      </div>
      <div class="field">
        <i class="bi bi-lock-fill"></i>
        <input type="password" name="password" placeholder="รหัสผ่าน" required autocomplete="current-password" />
        <button type="button" class="toggle" id="togglePw" aria-label="แสดง/ซ่อนรหัสผ่าน"><i class="bi bi-eye-slash"></i></button>
      </div>
      <button type="submit">เข้าสู่ระบบ</button>
    </form>

    <!-- โหมดคุณแฟน: ใส่วันครบรอบ -->
    <form id="partnerForm" autocomplete="off" hidden>
      <div class="field" id="dateField">
        <i class="bi bi-calendar-heart"></i>
        <input type="date" name="date" id="partnerDate" required />
      </div>
      <p class="hint">แตะที่ช่องเพื่อเลือกวันครบรอบจากปฏิทิน</p>
      <button type="submit">เข้าชม</button>
    </form>
  </div>

  <script>
    // หัวใจลอยพื้นหลัง
    (function () {
      const bg = document.getElementById('heartBg');
      const hearts = ['💗', '💕', '🌸', '💖'];
      for (let i = 0; i < 14; i++) {
        const s = document.createElement('span');
        s.textContent = hearts[i % hearts.length];
        s.style.left = Math.random() * 100 + 'vw';
        s.style.fontSize = 14 + Math.random() * 22 + 'px';
        s.style.animationDuration = 7 + Math.random() * 9 + 's';
        s.style.animationDelay = Math.random() * 8 + 's';
        bg.appendChild(s);
      }
    })();

    const ownerForm = document.getElementById('ownerForm');
    const partnerForm = document.getElementById('partnerForm');

    // สลับแท็บ
    document.querySelectorAll('.tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
        tab.classList.add('active');
        const owner = tab.dataset.mode === 'owner';
        ownerForm.hidden = !owner;
        partnerForm.hidden = owner;
      });
    });

    // แสดง/ซ่อนรหัสผ่าน
    const pwInput = ownerForm.querySelector('input[name="password"]');
    const toggle = document.getElementById('togglePw');
    toggle.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      toggle.innerHTML = show ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
    });

    // ส่งฟอร์ม (ใช้ร่วมกันทั้งสองโหมด)
    async function submitLogin(form, url, payload, btn) {
      btn.disabled = true;
      const original = btn.textContent;
      btn.textContent = 'กำลังเข้าสู่ระบบ...';
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        let data = {};
        try { data = await res.json(); } catch (_) {}
        if (res.ok && data.success) {
          window.location.href = '/';
        } else {
          Swal.fire({
            icon: 'error',
            title: 'เข้าสู่ระบบไม่สำเร็จ',
            text: data.error || 'ข้อมูลไม่ถูกต้อง',
            confirmButtonText: 'ลองอีกครั้ง',
            confirmButtonColor: '#eb8585',
          });
        }
      } catch (err) {
        Swal.fire({ icon: 'warning', title: 'มีปัญหาในการเชื่อมต่อ', text: 'กรุณาลองใหม่อีกครั้ง', confirmButtonColor: '#eb8585' });
      } finally {
        btn.disabled = false;
        btn.textContent = original;
      }
    }

    ownerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      submitLogin(
        ownerForm,
        '/login',
        { username: ownerForm.username.value.trim(), password: ownerForm.password.value },
        ownerForm.querySelector('button[type="submit"]')
      );
    });

    // เปิดปฏิทินทันทีเมื่อแตะที่ช่องวันครบรอบ (เลือกจากปฏิทินแทนการพิมพ์)
    const dateField = document.getElementById('dateField');
    const partnerDate = document.getElementById('partnerDate');
    dateField.addEventListener('click', () => {
      if (typeof partnerDate.showPicker === 'function') {
        try { partnerDate.showPicker(); } catch (_) {}
      }
    });

    partnerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      submitLogin(
        partnerForm,
        '/login-partner',
        { date: partnerForm.date.value },
        partnerForm.querySelector('button[type="submit"]')
      );
    });
  </script>
</body>
</html>
